<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111342">
  <title>Galaxy Sprite Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="kicker">Fortnite Collection Tracker</p>
      <h1>Galaxy Sprite Tracker</h1>
      <p class="sub">Tap a sprite to mark it collected. Tap the crown above it to mark it mastered.</p>
      <div class="summary">
        <div><strong id="collectedTotal">0 / 61</strong><span>Collected</span></div>
        <div><strong id="masteredTotal">0 / 61</strong><span>Mastered</span></div>
      </div>
    </header>

    <nav class="rarity-tabs" id="rarityTabs" aria-label="Sprite rarities"></nav>
    <main id="collections"></main>

    <footer>
      <button id="resetBtn" class="reset-btn" type="button">Reset all progress</button>
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
